version: '3.8'

services:
  backend_incap:
    build: ./backend
    container_name: incapacidades_backend
    restart: unless-stopped
    environment:
      - PORT=3000
    networks:
      - incapacidades_net
      - red_pro

  frontend_incap:
    image: nginx:alpine
    container_name: incapacidades_frontend
    restart: unless-stopped
    ports:
      - "8054:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - incapacidades_net
      - red_pro

networks:
  incapacidades_net:
    driver: bridge
  red_pro:
    external: true